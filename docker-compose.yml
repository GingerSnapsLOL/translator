services:
  translator:
    build:
      context: .
      dockerfile: Dockerfile
    image: translator-api:latest
    container_name: translator-api
    ports:
      - "8000:8000"
    environment:
      MODEL_NAME: facebook/nllb-200-distilled-600M
      DEVICE: cpu
      API_TITLE: Translator API
      API_VERSION: "0.1.0"
      HF_HOME: /cache/huggingface
    volumes:
      # Persist downloaded model weights across restarts.
      - hf-cache:/cache/huggingface
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status == 200 else 1)
      interval: 30s
      timeout: 10s
      retries: 5
      # Generous grace period: the model is loaded during startup.
      start_period: 180s

volumes:
  hf-cache:
